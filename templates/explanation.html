<!DOCTYPE html>
<html>
<head>
    <title>🤖 AI Vulnerability Explanation</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .card { border: 1px solid #333; padding: 10px; margin: 10px; border-radius: 5px; background: #f5f5f5; }
        h1 { color: #222; }
        pre { background: #eee; padding: 10px; border-radius: 5px; white-space: pre-wrap; }
    </style>
</head>
<body>
<h1>🤖 AI Vulnerability Explanation</h1>
<div id="explanations"></div>

<script>
async function fetchExplanations() {
    let res = await fetch("/ai_engine");
    let data = await res.json();

    let container = document.getElementById("explanations");
    container.innerHTML = "";

    data.forEach(r => {
        let card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <h2>${r.target}</h2>
            <strong>Risk:</strong> ${r.classified_risk}<br>
            <pre>${r.ai_explanation}</pre>
        `;
        container.appendChild(card);
    });
}

setInterval(fetchExplanations, 5000);
fetchExplanations();
</script>
</body>
</html>
